<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding: 0; background: var(--bg-forge); display:grid; grid-template-columns: 1.2fr 1fr; gap: 0; min-height: 220px; }
  .pane { padding: 24px; display:flex; align-items:center; justify-content:center; }
  .pane.dark { background: var(--bg-charcoal); border-right: 1px solid var(--border-subtle); }
  .pane.gradient { background: var(--forge-gradient-radial); }
  .lockup { display:flex; align-items:center; gap: 14px; }
  .lockup img { width: 64px; height: 64px; }
  .lockup .word { font-family: var(--font-ui); font-size: 24px; font-weight: 700; letter-spacing: -0.01em; color:#F2F3F6; }
  .lockup .word .forge { background: var(--forge-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lockup .tag { display:block; font-size: 10px; letter-spacing: .2em; color:#7C818E; font-weight:500; margin-top:2px; }
  .mark-only img { width: 128px; height: 128px; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5)); }
</style>
</head>
<body>
  <div class="pane dark">
    <div class="lockup">
      <img src="../assets/icon.png" alt=""/>
      <div>
        <div class="word">SelfCert<span class="forge">Forge</span></div>
        <span class="tag">LOCAL · TRUST · FORGE</span>
      </div>
    </div>
  </div>
  <div class="pane gradient mark-only">
    <img src="../assets/icon.png" alt=""/>
  </div>
</body>
</html>
