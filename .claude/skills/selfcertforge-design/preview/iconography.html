<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin:0; padding:20px; background: var(--bg-forge); }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .cell { background:#1B1D25; border:1px solid #2F333D; border-radius: 10px; padding: 10px 6px; display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .cell svg { width: 22px; height: 22px; stroke-width: 1.6; }
  .cell .name { font-family: var(--font-mono); font-size: 9px; color:#7C818E; text-align:center; }
  .accent svg { color:#FF6A00; }
  .yellow svg { color:#FFB800; }
  .danger svg { color:#E5484D; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell accent"><i data-lucide="hammer"></i><span class="name">hammer</span></div>
    <div class="cell yellow"><i data-lucide="sparkles"></i><span class="name">sparkles</span></div>
    <div class="cell"><i data-lucide="shield-check" style="color:#38C172"></i><span class="name">shield-check</span></div>
    <div class="cell"><i data-lucide="scroll-text"></i><span class="name">scroll-text</span></div>
    <div class="cell"><i data-lucide="file-badge"></i><span class="name">file-badge</span></div>
    <div class="cell"><i data-lucide="key-round"></i><span class="name">key-round</span></div>
    <div class="cell"><i data-lucide="database"></i><span class="name">database</span></div>
    <div class="cell"><i data-lucide="arrow-up-from-line"></i><span class="name">export</span></div>
    <div class="cell"><i data-lucide="settings-2"></i><span class="name">settings</span></div>
    <div class="cell danger"><i data-lucide="triangle-alert"></i><span class="name">alert</span></div>
    <div class="cell"><i data-lucide="clock-alert"></i><span class="name">expired</span></div>
    <div class="cell"><i data-lucide="copy"></i><span class="name">copy</span></div>
    <div class="cell"><i data-lucide="search"></i><span class="name">search</span></div>
    <div class="cell"><i data-lucide="trash-2"></i><span class="name">trash</span></div>
    <div class="cell"><i data-lucide="check"></i><span class="name">check</span></div>
    <div class="cell"><i data-lucide="x"></i><span class="name">x</span></div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
